<!DOCTYPE html>
<html>
<head>
    <title>Estimation Terrain Tana</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/leaflet.css') }}" />
    
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 20px; 
            background-color: #f4f7f6;
        }

        h1 { color: #2c3e50; text-align: center; }

        /* Le conteneur doit avoir une hauteur définie (ex: 80% de l'écran) */
        .main-container {
            display: flex;
            gap: 20px;
            height: 70vh; /* vh = viewport height, 70% de la hauteur de l'écran */
            min-height: 500px;
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* La carte doit remplir tout son conteneur parent */
        #map { 
            flex: 2; 
            height: 100% !important; 
            border-radius: 8px;
            border: 1px solid #ddd;
            z-index: 1; /* Assure que la carte reste sous les menus */
        }

        #formulaire { 
            flex: 1; 
            padding: 20px; 
            background: #ffffff;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
        }

        label { font-weight: bold; margin-bottom: 5px; color: #34495e; }
        select, button { 
            padding: 12px; 
            margin-bottom: 20px; 
            border-radius: 6px; 
            border: 1px solid #dcdde1;
            font-size: 16px;
        }

        button {
            background-color: #2ecc71;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        button:hover { background-color: #27ae60; }

        #result-box {
            margin-top: auto;
            padding: 15px;
            background: #ebf5fb;
            border-radius: 6px;
            border-left: 4px solid #3498db;
        }

        .main-container {
            display: flex;
            gap: 20px;
            /* On définit une hauteur basée sur l'écran (70% de la hauteur visible) */
            height: 70vh; 
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-top: 20px;
        }

        #map { 
            flex: 2; /* La carte prend plus de place que le formulaire */
            height: 100%; /* Elle remplit toute la hauteur du container */
            border-radius: 8px;
            border: 1px solid #ddd;
            /* Très important pour que les contrôles (+/-) s'affichent au bon endroit */
            z-index: 1; 
        }

        #formulaire { 
            flex: 1; 
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }
    </style>
</head>
<body>
    <h1>Calculateur de prix de terrain (Antananarivo)</h1>

    <div class="main-container">
        <div id="map"></div>

        <div id="formulaire">
            <h3>Caractéristiques du terrain</h3>
            
            <label>Accessibilité :</label>
            <select id="access">
                <option value="aucun">Aucun accès</option>
                <option value="moto">Accès Moto</option>
                <option value="voiture">Accès Voiture</option>
            </select>

            <label>Type de Papier :</label>
            <select id="papier">
                <option value="titre borne">Titre et Borné</option>
                <option value="kadasitra">Kadasitra</option>
                <option value="fifanolorana">Fifanolorana</option>
            </select>

            <button onclick="envoyerEstimation()">Estimer le prix</button>
            
            <div id="result-box" style="margin-top: 20px; padding: 10px; background: #e7f3fe; border-left: 5px solid #2196F3;">
                <h4 id="resultat" style="margin: 0;">Prix : -- Ar/m²</h4>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/leaflet.js') }}"></script>

    <script>
        // 1. Initialisation de la carte
        var map = L.map('map').setView([-18.8792, 47.5079], 13);

        // 2. Fond de carte (CartoDB est plus léger pour le dev)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // 3. Gestion du clic et du Popup
        var popup = L.popup();

        function onMapClick(e) {
            popup
                .setLatLng(e.latlng)
                .setContent("Terrain sélectionné aux coordonnées :<br>" + e.latlng.lat.toFixed(5) + " , " + e.latlng.lng.toFixed(5))
                .openOn(map);
            
            console.log("Coordonnées cliquées : ", e.latlng);
        }

        map.on('click', onMapClick);

        // 4. Fonction pour envoyer les données au Backend Python
        function envoyerEstimation() {
            const data = {
                accessibilite: document.getElementById('access').value,
                papier: document.getElementById('papier').value
            };

            fetch('/estimer', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            })
            .then(res => res.json())
            .then(res => {
                document.getElementById('resultat').innerText = "Prix estimé : " + res.prix_estime.toLocaleString() + " Ar/m²";
            })
            .catch(err => {
                alert("Erreur : Lance ton serveur app.py pour que l'estimation fonctionne !");
            });
        }
    </script>
</body>
</html>
